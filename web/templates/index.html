<title>Spotify Album Downloader</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 3rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  form { display: flex; flex-direction: column; gap: 0.5rem; }
  input { padding: 0.5rem; font-size: 1rem; }
  button { padding: 0.5rem; font-size: 1rem; cursor: pointer; }
  button:disabled { cursor: default; opacity: 0.6; }
  #status { margin-top: 1rem; white-space: pre-wrap; }
  #status.error { color: #b00020; }
  a.download { display: inline-block; margin-top: 0.5rem; }
</style>

<h1>Spotify Album Downloader</h1>
<form id="download-form">
  <input id="artist" type="text" placeholder="Artist name" required>
  <input id="album" type="text" placeholder="Album name" required>
  <button type="submit" id="submit-btn">Download</button>
</form>
<div id="status"></div>

<script>
  const form = document.getElementById("download-form");
  const statusEl = document.getElementById("status");
  const submitBtn = document.getElementById("submit-btn");
  let pollTimer = null;

  function stopPolling() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  async function pollStatus(jobId) {
    const res = await fetch(`/status/${jobId}`);
    if (!res.ok) {
      stopPolling();
      statusEl.textContent = "This job could not be found (it may have expired).";
      statusEl.classList.add("error");
      submitBtn.disabled = false;
      return;
    }
    const job = await res.json();

    if (job.status === "error") {
      stopPolling();
      statusEl.textContent = `Error: ${job.error}`;
      statusEl.classList.add("error");
      submitBtn.disabled = false;
      return;
    }

    if (job.status === "done") {
      stopPolling();
      statusEl.classList.remove("error");
      statusEl.innerHTML = `Done! <br><a class="download" href="/download/${jobId}">Download zip</a>`;
      submitBtn.disabled = false;
      return;
    }

    statusEl.classList.remove("error");
    statusEl.textContent = job.progress || `Status: ${job.status}...`;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    submitBtn.disabled = true;
    stopPolling();
    statusEl.classList.remove("error");
    statusEl.textContent = "Queuing job...";

    const artist = document.getElementById("artist").value.trim();
    const album = document.getElementById("album").value.trim();

    const res = await fetch("/jobs", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ artist, album }),
    });

    if (!res.ok) {
      statusEl.textContent = "Failed to start the job. Please try again.";
      statusEl.classList.add("error");
      submitBtn.disabled = false;
      return;
    }

    const { job_id } = await res.json();
    pollStatus(job_id);
    pollTimer = setInterval(() => pollStatus(job_id), 2000);
  });
</script>
